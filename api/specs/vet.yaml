schemas:
  VetProfileResponse:
    type: object
    required:
      - id
      - userId
      - firstName
      - lastName
      - specialty
      - experienceYears
      - available
    properties:
      id:
        type: integer
        format: int64
      userId:
        type: integer
        format: int64
      firstName:
        type: string
      lastName:
        type: string
      specialty:
        type: string
      experienceYears:
        type: integer
      description:
        type: string
      education:
        type: string
      priceRub:
        type: integer
      available:
        type: boolean

  UpdateVetProfileRequest:
    type: object
    properties:
      specialty:
        type: string
      experienceYears:
        type: integer
        minimum: 0
      description:
        type: string
      education:
        type: string
      priceRub:
        type: integer
        minimum: 0
      available:
        type: boolean

  CreateSlotRequest:
    type: object
    required:
      - startTime
    properties:
      startTime:
        type: string
        format: date-time

  SlotResponse:
    type: object
    required:
      - id
      - vetId
      - startTime
      - booked
    properties:
      id:
        type: integer
        format: int64
      vetId:
        type: integer
        format: int64
      startTime:
        type: string
        format: date-time
      booked:
        type: boolean
