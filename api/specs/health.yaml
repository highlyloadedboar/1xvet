paths:
  /api/health:
    get:
      tags:
        - health
      operationId: healthCheck
      summary: Health check
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/schemas/HealthResponse"

schemas:
  HealthResponse:
    type: object
    required:
      - status
    properties:
      status:
        type: string
        example: "ok"
      version:
        type: string
        example: "0.0.1"
