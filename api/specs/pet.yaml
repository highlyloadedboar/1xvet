paths:
  /api/pets:
    get:
      tags:
        - pet
      operationId: getMyPets
      summary: Get current user's pets
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of pets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/schemas/PetResponse"

    post:
      tags:
        - pet
      operationId: createPet
      summary: Add a new pet
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/schemas/CreatePetRequest"
      responses:
        "201":
          description: Pet created
          content:
            application/json:
              schema:
                $ref: "#/schemas/PetResponse"

  /api/pets/{petId}:
    get:
      tags:
        - pet
      operationId: getPet
      summary: Get pet by ID
      security:
        - bearerAuth: []
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Pet details
          content:
            application/json:
              schema:
                $ref: "#/schemas/PetResponse"
        "404":
          description: Pet not found
          content:
            application/json:
              schema:
                $ref: "common.yaml#/schemas/ErrorResponse"

    put:
      tags:
        - pet
      operationId: updatePet
      summary: Update pet
      security:
        - bearerAuth: []
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/schemas/UpdatePetRequest"
      responses:
        "200":
          description: Pet updated
          content:
            application/json:
              schema:
                $ref: "#/schemas/PetResponse"
        "404":
          description: Pet not found
          content:
            application/json:
              schema:
                $ref: "common.yaml#/schemas/ErrorResponse"

    delete:
      tags:
        - pet
      operationId: deletePet
      summary: Delete pet
      security:
        - bearerAuth: []
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "204":
          description: Pet deleted
        "404":
          description: Pet not found
          content:
            application/json:
              schema:
                $ref: "common.yaml#/schemas/ErrorResponse"

schemas:
  CreatePetRequest:
    type: object
    required:
      - name
      - species
    properties:
      name:
        type: string
        example: "Барсик"
      species:
        type: string
        enum:
          - DOG
          - CAT
          - BIRD
          - RODENT
          - REPTILE
          - OTHER
      breed:
        type: string
        example: "Британская короткошёрстная"
      birthDate:
        type: string
        format: date
        example: "2020-05-15"
      weight:
        type: number
        format: double
        example: 4.5

  UpdatePetRequest:
    type: object
    properties:
      name:
        type: string
      species:
        type: string
        enum:
          - DOG
          - CAT
          - BIRD
          - RODENT
          - REPTILE
          - OTHER
      breed:
        type: string
      birthDate:
        type: string
        format: date
      weight:
        type: number
        format: double

  PetResponse:
    type: object
    required:
      - id
      - name
      - species
      - ownerId
    properties:
      id:
        type: integer
        format: int64
      name:
        type: string
      species:
        type: string
        enum:
          - DOG
          - CAT
          - BIRD
          - RODENT
          - REPTILE
          - OTHER
      breed:
        type: string
      birthDate:
        type: string
        format: date
      weight:
        type: number
        format: double
      ownerId:
        type: integer
        format: int64
