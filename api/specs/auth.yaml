paths:
  /api/auth/register:
    post:
      tags:
        - auth
      operationId: register
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/schemas/RegisterRequest"
      responses:
        "201":
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: "#/schemas/AuthResponse"
        "409":
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: "common.yaml#/schemas/ErrorResponse"

  /api/auth/login:
    post:
      tags:
        - auth
      operationId: login
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "common.yaml#/schemas/ErrorResponse"

schemas:
  RegisterRequest:
    type: object
    required:
      - email
      - password
      - firstName
      - lastName
      - role
    properties:
      email:
        type: string
        format: email
        example: "ivan@example.com"
      password:
        type: string
        minLength: 8
        example: "securePass123"
      firstName:
        type: string
        example: "Иван"
      lastName:
        type: string
        example: "Петров"
      role:
        type: string
        enum:
          - OWNER
          - VET

  LoginRequest:
    type: object
    required:
      - email
      - password
    properties:
      email:
        type: string
        format: email
        example: "ivan@example.com"
      password:
        type: string
        example: "securePass123"

  AuthResponse:
    type: object
    required:
      - token
      - user
    properties:
      token:
        type: string
        description: JWT access token
      user:
        $ref: "#/schemas/UserInfo"

  UserInfo:
    type: object
    required:
      - id
      - email
      - firstName
      - lastName
      - role
    properties:
      id:
        type: integer
        format: int64
      email:
        type: string
      firstName:
        type: string
      lastName:
        type: string
      role:
        type: string
        enum:
          - OWNER
          - VET
