openapi: 3.1.0
info:
  title: 1xVet API
  description: Ветеринарная онлайн-платформа
  version: 0.0.1

servers:
  - url: http://localhost:8080
    description: Local development

paths:
  /api/health:
    get:
      tags:
        - health
      operationId: healthCheck
      summary: Health check
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /api/auth/register:
    post:
      tags:
        - auth
      operationId: register
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "409":
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/auth/login:
    post:
      tags:
        - auth
      operationId: login
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    # health
    HealthResponse:
      $ref: "health.yaml#/schemas/HealthResponse"

    # auth
    RegisterRequest:
      $ref: "auth.yaml#/schemas/RegisterRequest"
    LoginRequest:
      $ref: "auth.yaml#/schemas/LoginRequest"
    AuthResponse:
      $ref: "auth.yaml#/schemas/AuthResponse"
    UserInfo:
      $ref: "auth.yaml#/schemas/UserInfo"

    # common
    ErrorResponse:
      $ref: "common.yaml#/schemas/ErrorResponse"
