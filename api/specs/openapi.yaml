openapi: 3.1.0
info:
  title: 1xVet API
  description: Ветеринарная онлайн-платформа
  version: 0.0.1

servers:
  - url: http://localhost:8080
    description: Local development

paths:
  /api/health:
    get:
      tags:
        - health
      operationId: healthCheck
      summary: Health check
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

components:
  schemas:
    HealthResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          example: "ok"
        version:
          type: string
          example: "0.0.1"
