openapi: 3.1.0
info:
  title: ИКС ВЕТ API
  description: Ветеринарная онлайн-платформа
  version: 0.0.1

servers:
  - url: http://localhost:8080
    description: Local development

paths:
  /api/health:
    get:
      tags:
        - health
      operationId: healthCheck
      summary: Health check
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /api/auth/register:
    post:
      tags:
        - auth
      operationId: register
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "409":
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/pets:
    get:
      tags:
        - pet
      operationId: getMyPets
      summary: Get current user's pets
      responses:
        "200":
          description: List of pets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PetResponse"

    post:
      tags:
        - pet
      operationId: createPet
      summary: Add a new pet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePetRequest"
      responses:
        "201":
          description: Pet created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PetResponse"

  /api/pets/{petId}:
    get:
      tags:
        - pet
      operationId: getPet
      summary: Get pet by ID
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Pet details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PetResponse"
        "404":
          description: Pet not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    put:
      tags:
        - pet
      operationId: updatePet
      summary: Update pet
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePetRequest"
      responses:
        "200":
          description: Pet updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PetResponse"
        "404":
          description: Pet not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      tags:
        - pet
      operationId: deletePet
      summary: Delete pet
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "204":
          description: Pet deleted
        "404":
          description: Pet not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/vet/profile:
    get:
      tags:
        - vet
      operationId: getMyVetProfile
      summary: Get current vet's profile
      responses:
        "200":
          description: Vet profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VetProfileResponse"
        "404":
          description: Profile not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    put:
      tags:
        - vet
      operationId: updateVetProfile
      summary: Update vet profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateVetProfileRequest"
      responses:
        "200":
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VetProfileResponse"

  /api/vets:
    get:
      tags:
        - vet
      operationId: searchVets
      summary: Search veterinarians
      parameters:
        - name: specialty
          in: query
          schema:
            type: string
        - name: available
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of vets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VetProfileResponse"

  /api/vets/{vetId}:
    get:
      tags:
        - vet
      operationId: getVetProfile
      summary: Get vet profile by ID
      parameters:
        - name: vetId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Vet profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VetProfileResponse"
        "404":
          description: Vet not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/vet/slots:
    get:
      tags:
        - vet
      operationId: getMyVetSlots
      summary: List current vet's slots
      responses:
        "200":
          description: List of slots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SlotResponse"

    post:
      tags:
        - vet
      operationId: createVetSlot
      summary: Create a consultation slot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSlotRequest"
      responses:
        "201":
          description: Slot created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SlotResponse"
        "409":
          description: Slot at the same time already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/vet/slots/{slotId}:
    delete:
      tags:
        - vet
      operationId: deleteVetSlot
      summary: Delete a slot (only if not booked)
      parameters:
        - name: slotId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "204":
          description: Slot deleted
        "404":
          description: Slot not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Slot is already booked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/vets/{vetId}/slots:
    get:
      tags:
        - vet
      operationId: listVetSlots
      summary: List a vet's available (not booked) slots in a date range
      parameters:
        - name: vetId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: List of available slots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SlotResponse"
        "404":
          description: Vet not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/appointments:
    get:
      tags:
        - booking
      operationId: listMyAppointments
      summary: List current user's appointments (as owner or vet)
      responses:
        "200":
          description: List of appointments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AppointmentResponse"

    post:
      tags:
        - booking
      operationId: createAppointment
      summary: Owner books a slot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAppointmentRequest"
      responses:
        "201":
          description: Appointment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppointmentResponse"
        "403":
          description: Only owners can book
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Slot or pet not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Slot is already booked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/appointments/{appointmentId}/cancel:
    post:
      tags:
        - booking
      operationId: cancelAppointment
      summary: Cancel an appointment (owner or vet)
      parameters:
        - name: appointmentId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Appointment cancelled (idempotent)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppointmentResponse"
        "404":
          description: Appointment not found or caller is not a participant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/conversations:
    get:
      tags:
        - chat
      operationId: listConversations
      summary: List current user's conversations
      responses:
        "200":
          description: List of conversations sorted by recent activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ConversationResponse"

    post:
      tags:
        - chat
      operationId: createConversation
      summary: Create or fetch existing conversation with another user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateConversationRequest"
      responses:
        "200":
          description: Conversation (existing or newly created)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationResponse"
        "400":
          description: Invalid participant role combination
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Other user not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/conversations/{conversationId}/messages:
    get:
      tags:
        - chat
      operationId: listMessages
      summary: Fetch message history for a conversation
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Messages in chronological order
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MessageResponse"
        "404":
          description: Conversation not found or caller is not a participant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      tags:
        - chat
      operationId: sendMessage
      summary: Send a message into a conversation
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageRequest"
      responses:
        "201":
          description: Message saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "404":
          description: Conversation not found or caller is not a participant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/auth/login:
    post:
      tags:
        - auth
      operationId: login
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    # health
    HealthResponse:
      $ref: "health.yaml#/schemas/HealthResponse"

    # auth
    RegisterRequest:
      $ref: "auth.yaml#/schemas/RegisterRequest"
    LoginRequest:
      $ref: "auth.yaml#/schemas/LoginRequest"
    AuthResponse:
      $ref: "auth.yaml#/schemas/AuthResponse"
    UserInfo:
      $ref: "auth.yaml#/schemas/UserInfo"

    # pet
    CreatePetRequest:
      $ref: "pet.yaml#/schemas/CreatePetRequest"
    UpdatePetRequest:
      $ref: "pet.yaml#/schemas/UpdatePetRequest"
    PetResponse:
      $ref: "pet.yaml#/schemas/PetResponse"

    # vet
    VetProfileResponse:
      $ref: "vet.yaml#/schemas/VetProfileResponse"
    UpdateVetProfileRequest:
      $ref: "vet.yaml#/schemas/UpdateVetProfileRequest"
    CreateSlotRequest:
      $ref: "vet.yaml#/schemas/CreateSlotRequest"
    SlotResponse:
      $ref: "vet.yaml#/schemas/SlotResponse"

    # booking
    CreateAppointmentRequest:
      $ref: "booking.yaml#/schemas/CreateAppointmentRequest"
    AppointmentResponse:
      $ref: "booking.yaml#/schemas/AppointmentResponse"

    # chat
    CreateConversationRequest:
      $ref: "chat.yaml#/schemas/CreateConversationRequest"
    ConversationResponse:
      $ref: "chat.yaml#/schemas/ConversationResponse"
    SendMessageRequest:
      $ref: "chat.yaml#/schemas/SendMessageRequest"
    MessageResponse:
      $ref: "chat.yaml#/schemas/MessageResponse"

    # common
    ErrorResponse:
      $ref: "common.yaml#/schemas/ErrorResponse"
