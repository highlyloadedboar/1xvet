name: Deploy

on:
  workflow_dispatch:

env:
  REGISTRY: cr.yandex/crph08te7d3t1tjdnjdc
  VM_USER: yc-user
  VM_ADDRESS: 111.88.254.81

permissions:
  contents: read

jobs:
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Build & test
        working-directory: backend
        run: ./gradlew build

      - name: Login to Yandex Container Registry
        run: echo '${{ secrets.YC_SA_KEY }}' | docker login --username json_key --password-stdin cr.yandex

      - name: Build and push Docker image
        id: meta
        working-directory: backend
        run: |
          VERSION=$(git rev-parse --short HEAD)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          docker build -t ${{ env.REGISTRY }}/xvet-backend:$VERSION .
          docker push ${{ env.REGISTRY }}/xvet-backend:$VERSION

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Login to Yandex Container Registry
        run: echo '${{ secrets.YC_SA_KEY }}' | docker login --username json_key --password-stdin cr.yandex

      - name: Build and push Docker image
        id: meta
        working-directory: frontend
        run: |
          VERSION=$(git rev-parse --short HEAD)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          docker build -t ${{ env.REGISTRY }}/xvet-frontend:$VERSION .
          docker push ${{ env.REGISTRY }}/xvet-frontend:$VERSION

  deploy-testing:
    name: Deploy to Testing
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    environment: testing

    steps:
      - name: Deploy to VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ env.VM_ADDRESS }}
          username: ${{ env.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            sed -i 's|"cr.yandex": "ycr"|"cr.yandex": ""|g' ~/.docker/config.json 2>/dev/null || true
            echo '${{ secrets.YC_SA_KEY }}' | docker login --username json_key --password-stdin cr.yandex

            docker pull ${{ env.REGISTRY }}/xvet-backend:${{ needs.build-backend.outputs.image-tag }}
            docker stop xvet-backend 2>/dev/null || true
            docker rm xvet-backend 2>/dev/null || true
            docker run -d --name xvet-backend --restart unless-stopped -p 8080:8080 -e "SPRING_DATASOURCE_URL=${{ secrets.DB_URL }}" -e "SPRING_DATASOURCE_USERNAME=${{ secrets.DB_USER }}" -e "SPRING_DATASOURCE_PASSWORD=${{ secrets.DB_PASSWORD }}" -e "SPRING_PROFILES_ACTIVE=prod" -e "JWT_SECRET=${{ secrets.JWT_SECRET }}" ${{ env.REGISTRY }}/xvet-backend:${{ needs.build-backend.outputs.image-tag }}

            docker pull ${{ env.REGISTRY }}/xvet-frontend:${{ needs.build-frontend.outputs.image-tag }}
            docker stop xvet-frontend 2>/dev/null || true
            docker rm xvet-frontend 2>/dev/null || true
            docker run -d --name xvet-frontend --restart unless-stopped -p 3000:3000 ${{ env.REGISTRY }}/xvet-frontend:${{ needs.build-frontend.outputs.image-tag }}

  deploy-production:
    name: Deploy to Production
    needs: [build-backend, build-frontend, deploy-testing]
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy to VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ env.VM_ADDRESS }}
          username: ${{ env.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            docker pull ${{ env.REGISTRY }}/xvet-backend:${{ needs.build-backend.outputs.image-tag }}
            docker stop xvet-backend 2>/dev/null || true
            docker rm xvet-backend 2>/dev/null || true
            docker run -d --name xvet-backend --restart unless-stopped -p 8080:8080 -e "SPRING_DATASOURCE_URL=${{ secrets.DB_URL }}" -e "SPRING_DATASOURCE_USERNAME=${{ secrets.DB_USER }}" -e "SPRING_DATASOURCE_PASSWORD=${{ secrets.DB_PASSWORD }}" -e "SPRING_PROFILES_ACTIVE=prod" -e "JWT_SECRET=${{ secrets.JWT_SECRET }}" ${{ env.REGISTRY }}/xvet-backend:${{ needs.build-backend.outputs.image-tag }}

            docker pull ${{ env.REGISTRY }}/xvet-frontend:${{ needs.build-frontend.outputs.image-tag }}
            docker stop xvet-frontend 2>/dev/null || true
            docker rm xvet-frontend 2>/dev/null || true
            docker run -d --name xvet-frontend --restart unless-stopped -p 3000:3000 ${{ env.REGISTRY }}/xvet-frontend:${{ needs.build-frontend.outputs.image-tag }}
