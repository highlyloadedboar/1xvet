name: Deploy

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Build & test
        working-directory: backend
        run: ./gradlew build

      - name: Build Docker image
        id: meta
        working-directory: backend
        run: |
          VERSION=$(git rev-parse --short HEAD)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          docker build -t ${{ github.repository }}:$VERSION .

      # TODO: push image to container registry (Yandex Cloud CR)
      # - name: Push to registry
      #   run: ...

  deploy-testing:
    name: Deploy to Testing
    needs: build
    runs-on: ubuntu-latest
    environment: testing

    steps:
      - uses: actions/checkout@v4

      # TODO: deploy to Yandex Cloud testing environment
      - name: Deploy to testing
        run: echo "Deploying ${{ needs.build.outputs.image-tag }} to testing"

  deploy-production:
    name: Deploy to Production
    needs: [build, deploy-testing]
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      # TODO: deploy to Yandex Cloud production environment
      - name: Deploy to production
        run: echo "Deploying ${{ needs.build.outputs.image-tag }} to production"
