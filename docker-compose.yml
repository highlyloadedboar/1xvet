services:
  postgres:
    image: postgres:16-alpine
    container_name: xvet-postgres
    environment:
      POSTGRES_DB: xvet
      POSTGRES_USER: xvet
      POSTGRES_PASSWORD: xvet
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xvet"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
