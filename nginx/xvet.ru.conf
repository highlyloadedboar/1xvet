# Production reverse proxy for xvet.ru.
# Frontend on :3000, backend on :8080, Grafana on :3001 are all bound to
# 127.0.0.1 on the host. nginx terminates TLS and routes by host/path.
#
# After first deploy, request the cert once on the VM:
#   sudo certbot --nginx -d xvet.ru -d www.xvet.ru -d grafana.xvet.ru \
#     --redirect --agree-tos -m <your@email>
# certbot will edit this file in place to add ssl_* directives and the
# 80→443 redirect, and set up auto-renewal via systemd timer.

server {
    listen 80;
    listen [::]:80;
    server_name xvet.ru www.xvet.ru;

    # Used by certbot HTTP-01 challenge.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Frontend (Next.js).
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Backend (Spring Boot) served from the same domain under /api/.
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 25m;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name grafana.xvet.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
